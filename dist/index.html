<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地理范围圈选（高德）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        /* 地图容器 */
        #mapContainer { width: 100%; height: 100%; }
        
        /* 左侧面板 */
        .side-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 360px;
            height: 100%;
            background: white;
            box-shadow: 4px 0 20px rgba(0,0,0,0.08);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 大头针列表项 */
        .pin-item {
            transition: all 0.2s;
            cursor: pointer;
        }
        .pin-item:hover {
            background: #f0f7ff;
        }
        .pin-item.active {
            background: #dbeafe;
            border-left: 3px solid #3b82f6;
        }
        
        /* 已保存项 */
        .saved-item {
            transition: all 0.2s;
            cursor: pointer;
        }
        .saved-item:hover {
            background: #f0fdf4;
        }
        
        /* 闪动动画 */
        @keyframes pin-flash {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }
        .pin-flashing {
            animation: pin-flash 0.4s ease-in-out 3;
        }
        
        /* 搜索框 */
        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* Tab 切换 */
        .tab-btn {
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
            font-weight: 700;
        }
        
        /* 操作按钮 */
        .action-btn {
            transition: all 0.15s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .action-btn:active {
            transform: scale(0.97);
        }
        
        /* 提示框 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="bg-slate-100">
    <!-- 提示框 -->
    <div id="toast" class="toast"></div>
    
    <!-- 地图 -->
    <div id="mapContainer"></div>
    
    <!-- 左侧面板 -->
    <div class="side-panel">
        <!-- 标题 -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-500 text-white px-5 py-4">
            <h1 class="text-lg font-bold flex items-center gap-2">
                📍 地理范围圈选
            </h1>
            <p class="text-blue-100 text-xs mt-1">点击地图钉入大头针，圈选地理范围</p>
        </div>
        
        <!-- 搜索定位 -->
        <div class="px-4 py-3 border-b border-slate-100">
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="输入地址或坐标定位，如：天安门" 
                    class="search-input flex-1 px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm"
                >
                <button 
                    onclick="searchLocation()" 
                    class="action-btn bg-blue-500 text-white px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-blue-600"
                >
                    定位
                </button>
            </div>
        </div>
        
        <!-- Tab 切换 -->
        <div class="flex border-b border-slate-100">
            <button 
                id="tabPins" 
                onclick="switchTab('pins')" 
                class="tab-btn active flex-1 py-3 text-sm text-center"
            >
                📌 大头针 (<span id="pinCount">0</span>)
            </button>
            <button 
                id="tabSaved" 
                onclick="switchTab('saved')" 
                class="tab-btn flex-1 py-3 text-sm text-center text-slate-400"
            >
                💾 已保存 (<span id="savedCount">0</span>)
            </button>
        </div>
        
        <!-- 大头针列表 -->
        <div id="pinsList" class="flex-1 overflow-y-auto">
            <div id="pinsEmpty" class="flex flex-col items-center justify-center h-full text-slate-300">
                <p class="text-4xl mb-3">📍</p>
                <p class="text-sm font-bold">点击地图添加大头针</p>
                <p class="text-xs mt-1">大头针会自动连线形成范围</p>
            </div>
            <div id="pinsContent" class="hidden"></div>
        </div>
        
        <!-- 已保存列表 -->
        <div id="savedList" class="flex-1 overflow-y-auto hidden">
            <div id="savedEmpty" class="flex flex-col items-center justify-center h-full text-slate-300">
                <p class="text-4xl mb-3">💾</p>
                <p class="text-sm font-bold">暂无保存的范围</p>
                <p class="text-xs mt-1">添加大头针后可保存</p>
            </div>
            <div id="savedContent" class="hidden"></div>
        </div>
        
        <!-- 底部操作栏 -->
        <div class="border-t border-slate-100 px-4 py-3 bg-white">
            <div class="flex gap-2">
                <button 
                    onclick="saveCurrentPins()" 
                    class="action-btn flex-1 bg-emerald-500 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-emerald-600"
                >
                    💾 保存
                </button>
                <button 
                    onclick="exportCSV()" 
                    class="action-btn flex-1 bg-amber-500 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-amber-600"
                >
                    📤 导出
                </button>
                <button 
                    onclick="clearAllPins()" 
                    class="action-btn bg-red-100 text-red-500 px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-red-200"
                >
                    🗑️
                </button>
            </div>
        </div>
    </div>
    
    <!-- 高德地图 JS API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=170f60005b2534c9cc10618f939e7f20&plugin=AMap.Geocoder,AMap.PlaceSearch"></script>
    <script src="app.js"></script>
</body>
</html>
